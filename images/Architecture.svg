<svg viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04111f"/>
      <stop offset="100%" stop-color="#061825"/>
    </linearGradient>
    <linearGradient id="mainBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1869c4"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="lightBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="attnBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#155ea0"/>
      <stop offset="100%" stop-color="#0b3d7a"/>
    </linearGradient>
    <linearGradient id="qRow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="kRow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00695c"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
    <linearGradient id="hierGlobal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00838f"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <pattern id="diag" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#1a3a6e"/>
      <line x1="3.5" y1="0" x2="3.5" y2="7" stroke="#3d7cc9" stroke-width="2.5"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polygon points="0,0.5 8,4.5 0,8.5" fill="#3d7cc9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="900" fill="url(#bg)" rx="14"/>
  <rect width="640" height="900" fill="none" stroke="#0d3060" stroke-width="1" rx="14"/>

  <!-- TITLE -->
  <text x="320" y="36" text-anchor="middle" fill="#90caf9" font-size="12" letter-spacing="3">NOVAMIND  ·  D_MODEL = 1024</text>
  <line x1="140" y1="46" x2="480" y2="46" stroke="#0d3060" stroke-width="1"/>

  <!--
    Layout (top of each box):
    LM Head          y=64
    ↑ arrow 64→116
    Final RMSNorm    y=164
    ↑ arrow 164→216  ... but + circle at cy=228
    + circle         cy=228
    ↑ arrow from SwiGLU top  y=248→241
    SwiGLU FFN       y=248  h=46  bottom=294
    ↑ arrow 294→345 ... + circle at cy=355
    Pre-RMSNorm (top) y=354  h=46  bottom=400
    + circle         cy=413
    GQA Attention    y=424  h=124  bottom=548
    ↑ arrow
    Pre-RMSNorm (bot) y=566  h=46  bottom=612
    ↑ arrow
    Token Embedding  y=630  h=56  bottom=686
    ↑ arrow
    Token Input IDs  y=704  h=54
  -->

  <!-- LM Head -->
  <rect x="140" y="64" width="310" height="52" rx="9" fill="url(#lightBlue)" stroke="#42a5f5" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="295" y="86" text-anchor="middle" fill="#fff" font-size="14.5" font-weight="700">LM Head</text>
  <text x="295" y="106" text-anchor="middle" fill="#bbdefb" font-size="11.5">(tied to embedding)</text>

  <!-- Final RMSNorm -->
  <rect x="185" y="164" width="220" height="46" rx="9" fill="url(#lightBlue)" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="192" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Final RMSNorm</text>

  <!-- + circle (FFN residual add), cy=228 -->
  <circle cx="295" cy="228" r="13" fill="#071e3a" stroke="#3d7cc9" stroke-width="2"/>
  <text x="295" y="233.5" text-anchor="middle" fill="#90caf9" font-size="17" font-weight="700">+</text>

  <!-- SwiGLU FFN -->
  <rect x="185" y="254" width="220" height="46" rx="9" fill="url(#mainBlue)" stroke="#2979ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="282" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">SwiGLU FFN</text>

  <!-- Pre-RMSNorm (above attention) -->
  <rect x="185" y="346" width="220" height="46" rx="9" fill="url(#lightBlue)" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="374" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Pre-RMSNorm</text>

  <!-- + circle (attention residual add), cy=410 -->
  <circle cx="295" cy="412" r="13" fill="#071e3a" stroke="#3d7cc9" stroke-width="2"/>
  <text x="295" y="417.5" text-anchor="middle" fill="#90caf9" font-size="17" font-weight="700">+</text>

  <!-- GQA Attention Block -->
  <rect x="140" y="428" width="310" height="127" rx="9" fill="url(#attnBox)" stroke="#1e88e5" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="295" y="452" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="700">GQA Attention with HierRoPE</text>
  <!-- Q -->
  <rect x="158" y="460" width="274" height="32" rx="6" fill="#102a14"/>
  <rect x="158" y="460" width="32" height="32" rx="6" fill="url(#qRow)"/>
  <text x="174" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">Q</text>
  <rect x="192" y="460" width="240" height="32" rx="4" fill="#183320"/>
  <text x="312" y="481" text-anchor="middle" fill="#a5d6a7" font-size="11.5">Local RoPE base=10K</text>
  <!-- K -->
  <rect x="158" y="498" width="274" height="32" rx="6" fill="#0b2620"/>
  <rect x="158" y="498" width="32" height="32" rx="6" fill="url(#kRow)"/>
  <text x="174" y="519" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">K</text>
  <rect x="192" y="498" width="240" height="32" rx="4" fill="#0d2e2a"/>
  <text x="312" y="519" text-anchor="middle" fill="#80cbc4" font-size="11.5">Global RoPE base=500K</text>

  <!-- Pre-RMSNorm (below attention) -->
  <rect x="185" y="578" width="220" height="46" rx="9" fill="url(#lightBlue)" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="606" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Pre-RMSNorm</text>

  <!-- Token Embedding -->
  <rect x="140" y="648" width="310" height="56" rx="9" fill="url(#mainBlue)" stroke="#2979ff" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="295" y="672" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Token Embedding (32K vocab)</text>
  <text x="295" y="692" text-anchor="middle" fill="#bbdefb" font-size="12">[Sequence Length,  D=1024]</text>

  <!-- Token Input IDs -->
  <rect x="170" y="726" width="250" height="54" rx="9" fill="#0b2040" stroke="#1e4d8c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="748" text-anchor="middle" fill="#90caf9" font-size="14" font-weight="600">Token Input IDs</text>
  <text x="295" y="768" text-anchor="middle" fill="#64b5f6" font-size="11">(e.g., [Sequence Length])</text>

  <!-- ─── VERTICAL ARROWS (main flow) ─── -->
  <!-- Token Input → Token Embedding -->
  <line x1="295" y1="726" x2="295" y2="708" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- Token Embedding → Pre-RMSNorm (bot) -->
  <line x1="295" y1="648" x2="295" y2="628" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- Pre-RMSNorm (bot) → GQA Attention -->
  <line x1="295" y1="578" x2="295" y2="560" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- GQA Attention top → + (attn) -->
  <line x1="295" y1="428" x2="295" y2="427" stroke="#3d7cc9" stroke-width="2"/>
  <!-- + (attn) top → Pre-RMSNorm (top) -->
  <line x1="295" y1="399" x2="295" y2="396" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- Pre-RMSNorm (top) → SwiGLU -->
  <line x1="295" y1="346" x2="295" y2="304" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- SwiGLU → + (FFN) -->
  <line x1="295" y1="254" x2="295" y2="245" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- + (FFN) → Final RMSNorm -->
  <line x1="295" y1="215" x2="295" y2="214" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>
  <!-- Final RMSNorm → LM Head -->
  <line x1="295" y1="164" x2="295" y2="120" stroke="#3d7cc9" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ─── RESIDUAL CONNECTIONS ─── -->
  <!-- Residual 1: Pre-RMSNorm (bot) right → around right → + (attn) right -->
  <path d="M 405,601 Q 452,601 452,512 Q 452,412 310,412"
        fill="none" stroke="#3d7cc9" stroke-width="1.8" stroke-dasharray="6,3"
        marker-end="url(#ab)"/>
  <text x="458" y="510" fill="#64b5f6" font-size="10.5" font-style="italic">Residual</text>

  <!-- Residual 2: Pre-RMSNorm (top) right → around right → + (FFN) right -->
  <path d="M 405,370 Q 475,370 475,298 Q 475,228 310,228"
        fill="none" stroke="#3d7cc9" stroke-width="1.8" stroke-dasharray="6,3"
        marker-end="url(#ab)"/>

  <!-- Tie-back: Token Embedding right → LM Head right -->
  <path d="M 450,676 Q 540,676 540,90 Q 540,90 452,90"
        fill="none" stroke="#3d7cc9" stroke-width="1.5" stroke-dasharray="5,4"
        marker-end="url(#ab)"/>

  <!-- ─── 24× TRANSFORMER BRACKET ─── -->
  <rect x="90" y="344" width="22" height="336" rx="5" fill="none" stroke="#f9a825" stroke-width="2.2"/>
  <line x1="90" y1="344" x2="120" y2="344" stroke="#f9a825" stroke-width="2.2"/>
  <line x1="90" y1="680" x2="120" y2="680" stroke="#f9a825" stroke-width="2.2"/>
  <text x="80" y="514" text-anchor="middle" fill="#f9a825" font-size="12.5" font-weight="700"
        transform="rotate(-90,80,514)">24x Transformer Block</text>

  <!-- ─── HierRoPE PANEL ─── -->
  <rect x="475" y="452" width="152" height="158" rx="9" fill="#07192e" stroke="#1e6fbf" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="551" y="475" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="700">HierRoPE:</text>
  <text x="551" y="491" text-anchor="middle" fill="#90caf9" font-size="11">Hierarchical Rotary</text>
  <text x="551" y="506" text-anchor="middle" fill="#90caf9" font-size="11">Position Embedding</text>
  <text x="551" y="526" text-anchor="middle" fill="#bbdefb" font-size="11.5" font-weight="600" font-style="italic">D_h</text>
  <!-- bar -->
  <rect x="487" y="532" width="63" height="24" rx="4" fill="url(#diag)" stroke="#4a80c4" stroke-width="1.2"/>
  <rect x="552" y="532" width="63" height="24" rx="4" fill="url(#hierGlobal)" stroke="#00bcd4" stroke-width="1.2"/>
  <!-- labels -->
  <text x="518" y="572" text-anchor="middle" fill="#90caf9" font-size="10.5" font-weight="700">32 dims</text>
  <text x="518" y="585" text-anchor="middle" fill="#7eb8e8" font-size="10">local</text>
  <text x="518" y="598" text-anchor="middle" fill="#5d9fd8" font-size="9.5">(base=10K)</text>
  <text x="583" y="572" text-anchor="middle" fill="#4dd0e1" font-size="10.5" font-weight="700">32 dims</text>
  <text x="583" y="585" text-anchor="middle" fill="#4dd0e1" font-size="10">global</text>
  <text x="583" y="598" text-anchor="middle" fill="#00bcd4" font-size="9.5">(base=500K)</text>
  <!-- connector to attention -->
  <line x1="475" y1="544" x2="453" y2="514" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="453" cy="514" r="3.5" fill="#1976d2"/>

  <!-- FOOTNOTE -->
  <text x="320" y="865" text-anchor="middle" fill="#37474f" font-size="10.5">HierRoPE head dims: 16+16 → 32+32  ·  D_model: 512 → 1024</text>
</svg>